<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Societee.golf | The Future of Golf Societies</title>
    <style>
        :root {
            --golf-green: #2ecc71;
            --deep-bg: #0f172a;
            --text-main: #f8fafc;
        }

        body {
            background-color: var(--deep-bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        span.green {
            color: var(--golf-green);
        }

        p {
            font-size: 1.1rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .badge {
            display: inline-block;
            background: rgba(46, 204, 113, 0.1);
            color: var(--golf-green);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .cta-btn {
            background-color: var(--golf-green);
            color: white;
            padding: 1rem 2rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        footer {
            position: absolute;
            bottom: 2rem;
            font-size: 0.75rem;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">Beta Launch 2026</div>
        <h1>Societee<span class="green">.golf</span></h1>
        <p>The management platform for high-level golf societies. Real-time scoring and community flow.</p>
        <a href="mailto:info@societee.golf" class="cta-btn">Coming Soon</a>
    </div>

    <footer>
        &copy; 2026 Societee.golf | Part of the Serviflow &amp; Sustentus Family
    </footer>
</body>
</html>
